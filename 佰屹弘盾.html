  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#f59e0b,#d97706);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px}
    .card{background:#fff;border-radius:20px;padding:16px 12px;width:100%;max-width:480px;height:95vh;display:flex;flex-direction:column;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
    .header{text-align:center;padding:8px 0;flex-shrink:0}

    .dot{width:8px;height:8px;border-radius:50%}.dot.on{background:#10b981}.dot.off{background:#ef4444}
    .session-info{text-align:center;font-size:10px;color:#6b7280}
    .page-container{flex:1;overflow:hidden;position:relative}
    .page{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;background:#fff;transition:transform 0.3s}
    .page-list{transform:translateX(0)}
    .page-detail{transform:translateX(100%)}
    .page-detail.active{transform:translateX(0)}
    .page-list.slide-out{transform:translateX(-30%)}
    .device-list-container{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:10px;margin-bottom:6px}
    .device-list-title{font-size:13px;font-weight:700;color:#065f46;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .add-device-row{display:flex;gap:6px;margin-bottom:8px}

    .add-device-row .bind-btn{padding:10px 16px;background:#10b981;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .device-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:5px;background:#fff;border-radius:8px;cursor:pointer;border:1px solid #e5e7eb;transition:all 0.2s;gap:8px}

    .device-item .dev-left{flex:1;min-width:0}

    .device-item.reset .dev-status{color:#ef4444}
    .detail-header{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #e5e7eb;margin-bottom:8px;flex-shrink:0;gap:4px}

    .detail-imei{text-align:center;font-size:10px;color:#999;margin-bottom:8px}

    .led-ctrl-row{display:flex;gap:6px;margin-bottom:10px}

    .led-ctrl-btn:active{background:#f59e0b;color:#fff}
    textarea{display:block;width:100%;height:70px;padding:12px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:8px;background:#f9fafb;resize:none}

    .btn-loop{background:#ea580c}
    .row{display:flex;gap:6px;margin-bottom:6px}.row .btn{flex:1;margin:0}
    .timer-section{margin-top:10px;background:#f0fdf4;border-radius:10px;overflow:hidden;border:1px solid #86efac}

    .tab-bar{display:flex;gap:2px;margin-bottom:6px}.tab{flex:1;padding:8px 2px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:#e5e7eb;color:#6b7280}.tab.active{background:#f59e0b;color:#fff}
    .tab-row2{display:flex;gap:2px;margin-bottom:8px}.tab-row2 .tab{flex:0 0 calc(50% - 1px)}

    .toolbar{display:flex;gap:4px;margin-bottom:6px}.toolbar .btn-small{flex:1;padding:5px;border:none;border-radius:4px;font-size:10px;font-weight:600;color:#fff;cursor:pointer}
    .btn-delall{background:#ef4444}
    .timer-title-bar{background:#d1fae5;border:1px solid #a7f3d0;border-radius:6px;padding:6px 10px;margin-bottom:6px;text-align:center;font-weight:600;color:#065f46;font-size:12px}
    .st{text-align:center;font-size:11px;color:#6b7280;padding:6px;background:#f8fafc;border-radius:8px;min-height:24px;margin-top:6px;flex-shrink:0}
    .tip{text-align:center;font-size:10px;color:#d1d5db;margin-top:4px}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:500;display:none;animation:fadeInOut 3s}

    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:100}
    .modal-box{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:350px}.modal-box h3{text-align:center;margin-bottom:10px;font-size:16px}
    .modal-box input{display:block;width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;margin-bottom:8px;background:#f9fafb}

    .custom-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:300}
    .custom-modal.show{display:flex}
    .custom-modal-box{background:#fff;border-radius:20px;padding:20px;width:85%;max-width:380px;text-align:center;max-height:70vh;overflow-y:auto}
    .custom-modal-title{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:12px}
    .custom-modal-body{font-size:14px;color:#6b7280;line-height:1.8;margin-bottom:16px}
    .custom-modal-body .highlight{color:#ef4444;font-weight:700;background:#fef2f2;padding:3px 10px;border-radius:6px}
    .custom-modal-btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;background:#f59e0b;color:#fff;margin-bottom:6px}
    .custom-modal-btn-danger{background:#ef4444}
    .custom-modal-btn-row{display:flex;gap:8px}.custom-modal-btn-row .custom-modal-btn{flex:1}
    .user-table{width:100%;font-size:12px;border-collapse:collapse;margin:10px 0}
    .user-table th,.user-table td{padding:6px 8px;border:1px solid #e5e7eb;text-align:left}.user-table th{background:#f9fafb;font-weight:600}
    .user-link{color:#f59e0b;text-decoration:underline;cursor:pointer;font-weight:600}
    .device-row{background:#f0fdf4;padding:6px 8px;margin:4px 0;border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
    .login-box input{display:block;width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;margin-bottom:8px;background:#f9fafb}
    .login-box .btn-login{display:block;width:100%;padding:12px;border:none;border-radius:12px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;background:#f59e0b}
    .login-box .btn-link{display:block;width:100%;padding:8px;border:none;font-size:12px;cursor:pointer;background:none;text-decoration:underline}
    .btn-link-gold{color:#f59e0b}.btn-link-purple{color:#8b5cf6}
    .login-error{text-align:center;color:#ef4444;font-size:12px;margin-top:6px;display:none}
    .main-box{display:none;height:100%}

    .led-config-panel{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:10px;margin:10px 0;}
    .led-config-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;}
    .led-config-row label{white-space:nowrap;font-weight:600;color:#374151;}
    .led-config-row select{flex:1;padding:6px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;background:#fff;}
    .led-config-btn{width:100%;padding:10px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
    .led-config-btn:active{opacity:0.8;}
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="card" id="mainCard">
    <div class="login-box" id="loginBox"><h2 style="text-align:center; width:100%">佰屹弘盾用户登录</h2><input type="text" id="username" placeholder="用户名"><input type="password" id="password" placeholder="密码"><button class="btn-login" onclick="doLogin()">登 录</button><button class="btn-link btn-link-gold" onclick="showRegister()">注册新用户</button><button class="btn-link btn-link-purple" onclick="showRecover()">换手机？恢复设备</button><button class="btn-link" onclick="forceClear()" style="color:#ef4444;">🗑 清除本地数据</button><div class="login-error" id="loginError">用户名或密码错误</div></div>
    <div class="login-box" id="registerBox" style="display:none"><h2>用户注册</h2><input type="text" id="regUsername" placeholder="用户名(4-20位)"><input type="password" id="regPassword" placeholder="密码(8位,含字母数字)"><input type="password" id="regPassword2" placeholder="确认密码"><button class="btn-login" onclick="doRegister()">注 册</button><button class="btn-link btn-link-gold" onclick="showLogin()">已有账号？去登录</button><div class="login-error" id="registerError">注册失败</div></div>
    <div class="login-box" id="recoverBox" style="display:none"><h2>📱 恢复设备绑定</h2><div style="font-size:12px;color:#666;margin-bottom:10px;text-align:center">输入设备IMEI码恢复绑定</div><input type="text" id="recoverUsername" placeholder="用户名"><input type="password" id="recoverPassword" placeholder="密码"><input type="text" id="recoverIMEI" placeholder="设备IMEI后7位"><button class="btn-login" onclick="doRecover()">🔍 开始恢复</button><button class="btn-link btn-link-gold" onclick="showLogin()">返回登录</button><div class="login-error" id="recoverError">恢复失败</div></div>

    <div class="main-box" id="mainBox" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div style="flex-shrink:0">
        <div class="header"><h2>佰屹弘盾4G语音播报 <span id="userTypeBadge" style="font-size:9px;background:#10b981;color:#fff;padding:1px 6px;border-radius:8px;vertical-align:middle">用户</span></h2></div>
        <div class="conn"><span class="dot off" id="dot"></span><span id="connText">正在连接…</span></div>
        <div class="session-info" id="sessionInfo">🔓 未认证</div>
      </div>

      <div class="page-container" style="flex:1">
        <div class="page page-list" id="pageList">
          <div class="device-list-container">
            <div class="device-list-title">📻 设备列表 <button onclick="refreshDevices()" style="font-size:10px;background:#10b981;color:#fff;border:none;padding:2px 8px;border-radius:4px">刷新</button></div>
            <div class="add-device-row"><input type="text" id="newDevName" placeholder="设备名称" style="flex:1"><input type="text" id="newIMEI" placeholder="IMEI码" style="flex:1.2"><button class="bind-btn" onclick="bindDevice()">绑定</button></div>
            <div id="deviceList"></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;padding:0 4px"><button class="btn btn-admin" id="btnAdminUsers" onclick="showUserList()" style="display:none">👥 管理用户</button><button class="btn btn-status" onclick="getStatus()">查询设备状态</button><div class="row"><button class="btn btn-setpwd" onclick="showChangePwd()">修改密码</button><button class="btn btn-logout" onclick="doLogout()">退出登录</button></div></div>
          <div class="st" id="status">等待连接...</div>
          <div class="tip">循环播报中需先删除定时任务</div>
        </div>

        <div class="page page-detail" id="pageDetail">
          <div class="detail-header">
            <button class="back-btn" onclick="goBackToList()">←</button>
            <div class="detail-title-wrap"><input type="text" class="detail-title-input" id="detailDeviceNameInput" value="设备控制" readonly></div>
            <button class="detail-edit-btn" id="detailEditBtn" onclick="startEditName()">✏️</button>
            <button class="detail-save-btn" id="detailSaveBtn" onclick="saveDeviceName()">保存</button>
            <button class="detail-unbind-btn" onclick="showUnbindConfirm(detailIMEI,getDeviceName(detailIMEI))">解绑</button>
          </div>
          <div class="detail-imei" id="detailIMEI">IMEI: --</div>
          <div class="led-preview"><div class="led-preview-text" id="ledPreview">佰屹弘盾</div></div>
          <div class="led-ctrl-row">
            <button class="led-ctrl-btn" onclick="ledClear()">🧹清屏</button>
            <button class="led-ctrl-btn" id="muteBtn" onclick="toggleMute()">🔊 有声音</button>
            <button class="led-ctrl-btn" onclick="ledShowLogo()">🏠名称</button>
          </div>
          
          <div class="timer-section" id="ledConfigSection">
            <div class="timer-section-header" onclick="toggleLedConfig()">
              <span>⚙️ LED显示设置</span>
              <span id="ledConfigIcon">▼</span>
            </div>

              <div class="led-config-row">
                <label>显示模式</label>
                <select id="ledScrollMode">
                  <option value="1" selected>左移</option>
                  <option value="2">上移</option>
                  <option value="3">静止显示</option>
                </select>
              </div>
              <button class="led-config-btn" onclick="applyLedConfig()">应用设置</button>
              <div style="font-size:11px;color:#6b7280;margin-top:4px;text-align:center">修改后立即生效</div>
            </div>
          </div>

          <textarea id="textInput" placeholder="输入要播报的文字..."></textarea>
          <div class="row">
            <button class="btn btn-send" onclick="speak()">📢 立即播报</button>
            <button class="btn btn-loop" id="loopBtn" onclick="toggleManualLoop()">🔁 循环播报</button>
            <button class="btn btn-readback" onclick="readBack()">📋 回读</button>
          </div>
          <button class="btn btn-stop" onclick="stopRepeat()">⏹ 停止</button>
          <div class="timer-section expanded" id="timerSection"><div class="timer-section-header" onclick="toggleTimerSection()"><span>⏰ 定时播报</span><span id="timerExpandIcon">▼</span></div>
            <div class="timer-section-body"><div class="timer-title-bar" id="timerTitle">定时播报</div><div class="tab-bar" id="tabBar1"></div><div class="tab-row2" id="tabBar2"></div><div id="timerPanel"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal" id="changePwdModal"><div class="modal-box"><h3>修改密码</h3><input type="password" id="oldPwd" placeholder="旧密码"><input type="password" id="newPwd" placeholder="新密码(8位)"><input type="password" id="confirmPwd" placeholder="确认新密码"><div class="modal-error" id="changePwdError"></div><button class="btn btn-send" onclick="doChangePwd()">确认</button><button class="btn btn-logout" onclick="hideChangePwd()">取消</button></div></div>
  <div class="custom-modal" id="userListModal"><div class="custom-modal-box"><div class="custom-modal-title">👥 设备用户列表</div><div id="userListContent">加载中...</div><button class="custom-modal-btn" onclick="document.getElementById('userListModal').classList.remove('show')">关闭</button></div></div>
  <div class="custom-modal" id="unbindConfirmModal"><div class="custom-modal-box"><div class="custom-modal-title">确认解绑</div><div class="custom-modal-body">解绑 <span class="highlight" id="unbindDeviceName"></span>？</div><div class="custom-modal-btn-row"><button class="custom-modal-btn" onclick="cancelUnbind()">取消</button><button class="custom-modal-btn custom-modal-btn-danger" onclick="confirmUnbind()">确认</button></div></div></div>
  <div class="custom-modal" id="loopAlertModal"><div class="custom-modal-box"><div style="font-size:48px">⚠️</div><div class="custom-modal-title">设备正在循环播报中</div><div class="custom-modal-body">请先删除<span class="highlight" id="loopTaskInfo">定时播报</span><br>然后再进行立即播报</div><button class="custom-modal-btn" onclick="closeLoopAlert()">我知道了</button></div></div>

  <script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"></script>
  <script>
    var ADMIN_USER="admin",ADMIN_PASS="byhd6666";
    var cp=localStorage.getItem('byhd_password')||ADMIN_PASS;
    var st='',ia=false,isAdmin=false,ht=null,cd=0,td=0,tds="";
    var dn=["周日","周一","周二","周三","周四","周五","周六"];
    var r1=[1,2,3,4,5],r2=[6,0],ed=-1;
    var currentDeviceIMEI='',CMD_TOPIC='esp32/tts/command',STATUS_TOPIC='esp32/tts/status';
    var devices=[],pendingUnbindIMEI='',deviceStatus='',pageVisible=true;
    var c=null,ok=false,lt="",ct=null;

    var isMuted = false;
    var manualLoopActive = false;
    var manualLoopText = '';

    // 定时任务数据（全局数组，按设备独立存储）
